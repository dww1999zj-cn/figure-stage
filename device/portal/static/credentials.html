<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>凭证配置</title>
  <style>
    :root { --bg:#0f1419; --panel:#1a222c; --text:#e8eef4; --muted:#8b9aab; --accent:#3d9cf0; --border:#2c3848; --ok:#3ecf8e; --err:#e85d5d; }
    *{box-sizing:border-box} body{margin:0;font-family:"Segoe UI","PingFang SC",sans-serif;color:var(--text);background:var(--bg);padding:24px 16px}
    .wrap{max-width:440px;margin:0 auto} a{color:var(--accent);text-decoration:none}
    h1{font-size:1.25rem} p{color:var(--muted);font-size:.9rem;line-height:1.4}
    label{display:block;font-size:.8rem;color:var(--muted);margin:12px 0 6px}
    input,button{width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--panel);color:var(--text);font-size:1rem}
    button{background:linear-gradient(180deg,#3d9cf0,#2a6fad);border:none;font-weight:600;margin-top:16px;cursor:pointer}
    .hint{font-size:.8rem;color:var(--muted)} .ok{color:var(--ok)} .err{color:var(--err)}
    .box{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px;margin:10px 0;font-size:.85rem;word-break:break-all}
  </style>
</head>
<body>
  <div class="wrap">
    <p><a href="/">← 返回</a></p>
    <h1>语音与云凭证</h1>
    <p>识别云 Token 由运营方提供，须与云端 <code>CLOUD_API_TOKEN</code> 完全一致。豆包密钥只保存在本机，不会上传到识别云。密钥类留空表示不修改已保存项。</p>
    <div class="box" id="ids">加载中…</div>
    <label>CLOUD_BASE_URL</label>
    <input id="CLOUD_BASE_URL" placeholder="https://figure-stage-cloud.zeabur.app" />
    <label>DEVICE_CLOUD_TOKEN（与云 CLOUD_API_TOKEN 相同）</label>
    <input id="DEVICE_CLOUD_TOKEN" type="password" autocomplete="off" placeholder="运营方提供的 Token，留空=不修改" />
    <label>DOUBAO_APP_ID</label>
    <input id="DOUBAO_APP_ID" />
    <label>DOUBAO_ACCESS_KEY</label>
    <input id="DOUBAO_ACCESS_KEY" type="password" autocomplete="off" placeholder="留空=不修改" />
    <label>DOUBAO_APP_KEY</label>
    <input id="DOUBAO_APP_KEY" type="password" autocomplete="off" placeholder="留空=不修改" />
    <label>AUDIO_DEVICE_ID</label>
    <input id="AUDIO_DEVICE_ID" value="0" />
    <label>LUCKIN_ENABLED</label>
    <input id="LUCKIN_ENABLED" placeholder="true / false" />
    <label>LUCKIN_TOKEN</label>
    <input id="LUCKIN_TOKEN" type="password" placeholder="留空=不修改" />
    <label>经纬度</label>
    <input id="LUCKIN_LONGITUDE" placeholder="longitude" />
    <input id="LUCKIN_LATITUDE" placeholder="latitude" style="margin-top:8px" />
    <button type="button" id="save">保存</button>
    <p class="hint" id="status"></p>
  </div>
  <script>
    const keys=["CLOUD_BASE_URL","DEVICE_CLOUD_TOKEN","DOUBAO_APP_ID","DOUBAO_ACCESS_KEY","DOUBAO_APP_KEY","AUDIO_DEVICE_ID","LUCKIN_ENABLED","LUCKIN_TOKEN","LUCKIN_LONGITUDE","LUCKIN_LATITUDE"];
    const masked=new Set(["DEVICE_CLOUD_TOKEN","DOUBAO_ACCESS_KEY","DOUBAO_APP_KEY","LUCKIN_TOKEN"]);
    async function load(){
      const d=await (await fetch("/api/config")).json();
      const c=d.config||{};
      document.getElementById("ids").innerHTML =
        "DEVICE_ID: <b>"+(c.DEVICE_ID||"")+"</b>（本机自动生成，区分设备）<br>识别云 Token: "+(c.DEVICE_CLOUD_TOKEN_set==="1"?"已设置":"<span style='color:#e85d5d'>未设置，请填写运营方 Token</span>");
      keys.forEach(k=>{
        const el=document.getElementById(k); if(!el) return;
        if(masked.has(k)){ el.value=""; el.placeholder=c[k+"_set"]==="1"?"已保存，留空不修改":"请填写"; return; }
        el.value=c[k]||"";
      });
    }
    async function save(){
      const body={};
      keys.forEach(k=>{ const el=document.getElementById(k); if(el) body[k]=el.value; });
      const r=await fetch("/api/config",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
      const d=await r.json();
      const st=document.getElementById("status");
      if(!d.ok){ st.className="hint err"; st.textContent=d.error||"失败"; return; }
      st.className="hint ok"; st.textContent="已保存到本机";
      load();
    }
    document.getElementById("save").onclick=()=>save();
    load();
  </script>
</body>
</html>
