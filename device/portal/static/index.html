<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Figure Stage 设置</title>
  <style>
    :root { --bg:#0f1419; --panel:#1a222c; --text:#e8eef4; --muted:#8b9aab; --accent:#3d9cf0; --border:#2c3848; --ok:#3ecf8e; --warn:#e8b84d; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; color:var(--text);
      background: radial-gradient(ellipse 120% 80% at 50% -20%, #1e3a5f 0%, transparent 55%), var(--bg); padding:28px 16px; }
    .wrap { max-width:440px; margin:0 auto; }
    h1 { font-size:1.4rem; margin:0 0 8px; }
    p { color:var(--muted); line-height:1.45; }
    .banner { background:linear-gradient(135deg,#1e3a5f,#1a222c); border:1px solid var(--accent); border-radius:12px;
      padding:14px 16px; margin:16px 0; }
    .banner h2 { margin:0 0 6px; font-size:1rem; color:var(--text); }
    .banner p { margin:0 0 10px; font-size:.88rem; }
    .banner a.btn { display:inline-block; background:var(--accent); color:#fff; padding:8px 14px; border-radius:8px;
      text-decoration:none; font-size:.9rem; font-weight:600; }
    .url-box { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:14px 16px; margin:12px 0; }
    .url-box .label { font-size:.75rem; color:var(--muted); margin-bottom:6px; }
    .url-box a.main { display:block; font-size:1.05rem; font-weight:600; color:var(--ok); word-break:break-all; text-decoration:none; }
    .url-box .alt { margin-top:8px; font-size:.8rem; color:var(--muted); word-break:break-all; }
    .url-box .hint { margin-top:8px; font-size:.78rem; color:var(--warn); line-height:1.4; }
    a.card { display:block; background:var(--panel); border:1px solid var(--border); border-radius:12px;
      padding:16px; margin:12px 0; color:var(--text); text-decoration:none; position:relative; }
    a.card:hover { border-color:var(--accent); }
    a.card.next { border-color:var(--accent); box-shadow:0 0 0 1px rgba(61,156,240,.25); }
    a.card strong { display:block; margin-bottom:4px; }
    a.card span.desc { font-size:.88rem; color:var(--muted); }
    a.card .badge { position:absolute; top:14px; right:14px; font-size:.7rem; background:var(--accent); color:#fff;
      padding:3px 8px; border-radius:999px; font-weight:600; }
    .meta { font-size:0.85rem; color:var(--muted); margin-top:20px; line-height:1.5; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Figure Stage</h1>
    <p>一个门户完成全部设置。配网、凭证、手办都在<strong style="color:var(--text)">同一地址</strong>的不同页面。</p>

    <div id="banner" class="banner" style="display:none">
      <h2 id="banner-title"></h2>
      <p id="banner-detail"></p>
      <a class="btn" id="banner-action" href="/">继续</a>
    </div>

    <div class="url-box" id="url-box" style="display:none">
      <div class="label" id="url-label">本机门户地址</div>
      <a class="main" id="url-main" href="/"></a>
      <div class="alt" id="url-alt"></div>
      <div class="hint" id="url-hint"></div>
    </div>

    <a class="card" id="card-wifi" href="/wifi">
      <strong>Wi‑Fi 配网</strong>
      <span class="desc">让设备连上家里无线网络</span>
    </a>
    <a class="card" id="card-credentials" href="/credentials">
      <strong>语音与云凭证</strong>
      <span class="desc">豆包密钥、云 Token（仅存本机）</span>
    </a>
    <a class="card" id="card-figures" href="/figures">
      <strong>手办注册</strong>
      <span class="desc">固定摄像头采帧，特征存云端</span>
    </a>
    <div class="meta" id="meta">加载中…</div>
  </div>
  <script>
    const cards = {
      "/wifi": document.getElementById("card-wifi"),
      "/credentials": document.getElementById("card-credentials"),
      "/figures": document.getElementById("card-figures"),
    };

    function setNextCard(href) {
      Object.values(cards).forEach(c => {
        c.classList.remove("next");
        const b = c.querySelector(".badge");
        if (b) b.remove();
      });
      const el = cards[href];
      if (!el) return;
      el.classList.add("next");
      const badge = document.createElement("span");
      badge.className = "badge";
      badge.textContent = "下一步";
      el.appendChild(badge);
    }

    function renderUrls(st) {
      const p = st.portal || {};
      const box = document.getElementById("url-box");
      const main = document.getElementById("url-main");
      const alt = document.getElementById("url-alt");
      const hint = document.getElementById("url-hint");
      const label = document.getElementById("url-label");
      if (!p.preferred_url) { box.style.display = "none"; return; }
      box.style.display = "block";
      main.href = p.preferred_url;
      main.textContent = p.preferred_url;
      if (st.wifi) {
        label.textContent = "联网后请收藏此地址（以后都用它）";
        alt.textContent = p.lan_ip_url ? ("备用 IP：" + p.lan_ip_url) : "";
        hint.textContent = "";
      } else {
        label.textContent = "当前（热点配网阶段）";
        alt.textContent = "配网完成后请改连家里 Wi‑Fi，并打开 " + (p.home_url || "");
        hint.textContent = "热点 SSID：" + (p.hotspot_ssid || "FigureStage-Setup") +
          " · 密码：" + (p.hotspot_password || "figurestage");
      }
    }

    async function refresh() {
      try {
        const [stRes, cfgRes] = await Promise.all([
          fetch("/api/status").then(r => r.json()),
          fetch("/api/config").then(r => r.json()),
        ]);
        if (!stRes.ok) throw new Error(stRes.error || "status");
        const st = stRes;
        const c = (cfgRes.config || {});

        const ns = st.next_step || {};
        const banner = document.getElementById("banner");
        banner.style.display = "block";
        document.getElementById("banner-title").textContent = ns.title || "设置向导";
        document.getElementById("banner-detail").textContent = ns.detail || "";
        const action = document.getElementById("banner-action");
        action.href = ns.action_href || "/";
        action.textContent = ns.action_label || "继续";

        renderUrls(st);
        if (st.phase !== "stage_ready") setNextCard(ns.action_href);
        else Object.values(cards).forEach(c => c.classList.remove("next"));

        document.getElementById("meta").textContent =
          "阶段：" + (st.phase || "-") +
          " · 设备 ID：" + (c.DEVICE_ID || "-") +
          " · 已注册手办：" + (st.figure_count || 0);
      } catch (e) {
        document.getElementById("meta").textContent = "无法读取状态，请刷新页面";
      }
    }
    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
